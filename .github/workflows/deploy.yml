name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://artifacts.infisical.com/repos/deb/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: infisical run --env=prod -- pnpm build:worker
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}

      - name: Deploy to Cloudflare Workers
        run: infisical run --env=prod -- npx wrangler deploy
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
